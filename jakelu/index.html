<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jakelu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000;
  --gold: #c8881e;
  --gold-dim: rgba(200, 136, 30, 0.35);
  --gold-glow: rgba(200, 136, 30, 0.12);
  --white: rgba(255,255,255,0.85);
  --white-dim: rgba(255,255,255,0.35);
  --white-faint: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.1);
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* ─── STARS ─── */
#stars-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ─── MAIN LAYOUT ─── */
.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  gap: 0;
}

/* ─── WORDMARK ─── */
.wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.35em;
  color: var(--white-dim);
  text-transform: uppercase;
  position: fixed;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

/* ─── PORTAL ─── */
.portal-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
}

.portal-section.has-result {
  transform: translateY(-20px);
}

.hole-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
}

/* Accretion disk layers */
.disk {
  position: absolute;
  border-radius: 50%;
  animation: spin linear infinite;
}

.disk-1 {
  width: 180px; height: 180px;
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(160,90,20,0.18) 12%,
    rgba(210,140,40,0.38) 22%,
    rgba(160,90,20,0.18) 32%,
    transparent 42%,
    rgba(90,50,10,0.08) 62%,
    rgba(170,110,30,0.22) 78%,
    transparent 100%
  );
  animation-duration: 9s;
}

.disk-2 {
  width: 210px; height: 210px;
  background: conic-gradient(
    from 200deg,
    transparent 0%,
    rgba(130,70,10,0.1) 18%,
    rgba(190,120,30,0.2) 32%,
    transparent 48%,
    rgba(110,55,8,0.06) 72%,
    transparent 100%
  );
  animation-duration: 14s;
  animation-direction: reverse;
}

.disk-3 {
  width: 155px; height: 155px;
  background: conic-gradient(
    from 100deg,
    transparent 0%,
    rgba(200,130,30,0.12) 20%,
    transparent 35%,
    rgba(150,80,15,0.16) 65%,
    rgba(200,130,30,0.1) 80%,
    transparent 100%
  );
  animation-duration: 6s;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.lens {
  position: absolute;
  width: 118px; height: 118px;
  border-radius: 50%;
  box-shadow:
    0 0 0 1.5px rgba(180,110,25,0.18),
    0 0 0 3px rgba(140,80,15,0.1),
    0 0 28px 8px rgba(110,60,10,0.2);
  z-index: 1;
}

.void {
  position: absolute;
  width: 102px; height: 102px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%,
    #060402 0%, #020100 45%, #000 100%
  );
  box-shadow:
    0 0 40px 20px rgba(0,0,0,0.98),
    0 0 80px 40px rgba(0,0,0,0.75);
  z-index: 2;
}

.void-label {
  position: absolute;
  z-index: 3;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 0.32em;
  color: rgba(255,255,255,0.22);
  user-select: none;
  pointer-events: none;
}

.attach-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  opacity: 1;
  transition: opacity 0.2s;
}
.attach-btn:hover { opacity: 0.7; }
.attach-btn svg { stroke: rgba(0,0,0,0.55); }
.attach-btn.has-file svg { stroke: #4FC3A1; }

/* ─── INPUT BAR ─── */
.input-wrap {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.92);
  border: 0.5px solid rgba(255,255,255,0.6);
  border-radius: 50px;
  padding: 10px 12px 10px 22px;
  width: min(500px, 90vw);
  gap: 10px;
  transition: border-color 0.3s, background 0.3s;
}

.input-wrap:focus-within {
  border-color: rgba(200,136,30,0.5);
  background: rgba(255,255,255,0.96);
}

.input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #000;
  font-family: 'Jost', sans-serif;
  font-weight: 400;
  font-size: 14px;
  letter-spacing: 0.02em;
}

.input-wrap input::placeholder {
  color: rgba(0,0,0,0.55);
}

.send-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #0a0908;
  border: 0.5px solid rgba(10,9,8,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}

.send-btn:hover { background: #1a1714; }
.send-btn:active { transform: scale(0.92); }
.send-btn svg { width: 13px; height: 13px; stroke: #4FC3A1; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ─── ANALYZING STATE ─── */
.analyzing-bar {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 10px 22px;
  width: min(500px, 90vw);
}

.analyzing-bar.active { display: flex; }

.pulse-dots {
  display: flex;
  gap: 5px;
}

.pulse-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse-dot 1.4s ease-in-out infinite;
}

.pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
.pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse-dot {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.analyzing-text {
  font-size: 12px;
  color: var(--white-dim);
  letter-spacing: 0.06em;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

/* ─── RESULT SECTION ─── */
.result-section {
  width: min(640px, 92vw);
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
  margin-top: 40px;
  display: none;
}

.result-section.visible {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* Flow line */
.flow-connector {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}

.flow-connector svg { opacity: 0.3; }

/* Analysis card */
.analysis-card {
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.02);
}

.card-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--white-dim);
  text-transform: uppercase;
  margin-bottom: 10px;
  font-family: 'Jost', sans-serif;
  font-weight: 400;
}

.card-body {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,255,255,0.75);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

/* Platform strategies */
.platforms-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.platform-card {
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.02);
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color 0.2s, background 0.2s;
}

.platform-card:hover {
  border-color: var(--gold-dim);
  background: rgba(200,136,30,0.04);
}

.platform-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.platform-name {
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--gold);
  font-family: 'Jost', sans-serif;
  font-weight: 400;
  text-transform: uppercase;
}

.priority-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.06em;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

.priority-high { background: rgba(200,136,30,0.15); color: rgba(220,160,60,0.9); border: 0.5px solid rgba(200,136,30,0.25); }
.priority-med { background: rgba(255,255,255,0.06); color: var(--white-dim); border: 0.5px solid var(--border); }

.platform-tactic {
  font-size: 13px;
  line-height: 1.6;
  color: rgba(255,255,255,0.65);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

.platform-copy {
  font-size: 12px;
  line-height: 1.6;
  color: rgba(255,255,255,0.45);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  padding: 8px 12px;
  border-left: 1px solid var(--gold-dim);
  margin-top: 4px;
  cursor: text;
}

.platform-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

.btn-copy {
  padding: 4px 12px;
  border-radius: 6px;
  background: transparent;
  border: 0.5px solid rgba(79,195,161,0.25);
  color: rgba(79,195,161,0.7);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

.btn-copy:hover {
  background: rgba(79,195,161,0.08);
  border-color: rgba(79,195,161,0.5);
  color: rgba(79,195,161,1);
}

.btn-copy.copied {
  border-color: rgba(79,195,161,0.6);
  color: rgba(79,195,161,1);
  background: rgba(79,195,161,0.1);
}

.platform-card.approved {
  border-color: rgba(79,195,161,0.3);
  background: rgba(79,195,161,0.04);
}

.approved-mark {
  font-size: 10px;
  color: rgba(79,195,161,0.7);
  letter-spacing: 0.08em;
  font-family: 'Jost', sans-serif;
  display: none;
}

.platform-card.approved .approved-mark { display: inline; }

/* Approve section */
.approve-section {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 8px;
}

.btn-approve {
  flex: 1;
  padding: 11px 20px;
  border-radius: 8px;
  background: rgba(200,136,30,0.12);
  border: 0.5px solid rgba(200,136,30,0.3);
  color: rgba(220,160,60,0.9);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.btn-approve:hover {
  background: rgba(200,136,30,0.22);
  border-color: rgba(200,136,30,0.5);
}

.btn-reset {
  padding: 11px 18px;
  border-radius: 8px;
  background: transparent;
  border: 0.5px solid var(--border);
  color: var(--white-dim);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: border-color 0.2s;
}

.btn-reset:hover { border-color: rgba(255,255,255,0.25); }

/* API key config */
.api-config {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 20;
}

.api-toggle {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
}

.api-toggle:hover { background: rgba(255,255,255,0.08); }
.api-toggle svg { width: 14px; height: 14px; stroke: var(--white-dim); fill: none; stroke-width: 1.5; stroke-linecap: round; }

.api-panel {
  position: absolute;
  bottom: 44px;
  right: 0;
  background: #0a0908;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  width: 260px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

.api-panel.open { display: flex; }

.api-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--white-dim);
  text-transform: uppercase;
  font-family: 'Jost', sans-serif;
}

.api-input {
  background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  width: 100%;
  outline: none;
  letter-spacing: 0.02em;
}

.api-input:focus { border-color: var(--gold-dim); }

.api-save {
  padding: 7px 12px;
  border-radius: 6px;
  background: rgba(200,136,30,0.12);
  border: 0.5px solid rgba(200,136,30,0.25);
  color: rgba(220,160,60,0.9);
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s;
}

.api-save:hover { background: rgba(200,136,30,0.22); }

.api-status {
  font-size: 10px;
  color: var(--white-dim);
  letter-spacing: 0.04em;
}

.api-status.ok { color: rgba(80,200,130,0.8); }
.api-status.err { color: rgba(220,80,80,0.8); }

/* approved toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(200,136,30,0.15);
  border: 0.5px solid rgba(200,136,30,0.35);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 13px;
  color: rgba(220,160,60,0.9);
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 100;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

/* ─── HISTORY OVERLAY ─── */
.history-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 20px 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  overflow-y: auto;
}

.history-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.history-panel {
  background: #0a0908;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  width: min(560px, 92vw);
  padding: 28px 28px 24px;
  transform: translateY(10px);
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
}

.history-overlay.open .history-panel { transform: translateY(0); }

.history-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
}

.history-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-style: italic;
  font-size: 20px;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.04em;
}

.history-count {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.08em;
}

.history-empty {
  text-align: center;
  padding: 32px 0;
  font-size: 13px;
  color: rgba(255,255,255,0.2);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  letter-spacing: 0.04em;
}

.history-item {
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
  padding: 14px 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.history-item:last-child { border-bottom: none; }

.history-item-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.history-input {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-date {
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.06em;
  white-space: nowrap;
  flex-shrink: 0;
}

.history-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.history-type {
  font-size: 10px;
  color: rgba(200,136,30,0.6);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'Jost', sans-serif;
}

.history-platforms {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.history-platform-chip {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35);
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.04em;
}

.history-backlinks {
  font-size: 10px;
  color: rgba(79,195,161,0.5);
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.06em;
  margin-left: auto;
}

.history-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 0.5px solid rgba(255,255,255,0.06);
}

.btn-history-close {
  padding: 8px 20px;
  border-radius: 7px;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.35);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.btn-history-close:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }

.btn-history-clear {
  padding: 8px 16px;
  border-radius: 7px;
  background: transparent;
  border: 0.5px solid rgba(220,80,80,0.2);
  color: rgba(220,80,80,0.4);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.btn-history-clear:hover { border-color: rgba(220,80,80,0.45); color: rgba(220,80,80,0.7); }

/* ─── PROFILE OVERLAY ─── */
.profile-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 20px 40px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
  overflow-y: auto;
}
.profile-overlay.open { opacity: 1; pointer-events: all; }

.profile-panel {
  background: #0a0908;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  width: min(580px, 94vw);
  padding: 32px 32px 28px;
  transform: translateY(10px);
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.profile-overlay.open .profile-panel { transform: translateY(0); }

.profile-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600; font-style: italic;
  font-size: 22px; color: rgba(255,255,255,0.85);
  margin-bottom: 6px;
}
.profile-subtitle {
  font-size: 11px; color: rgba(255,255,255,0.25);
  font-family: 'Jost', sans-serif; letter-spacing: 0.08em;
  margin-bottom: 28px;
}

.profile-section-title {
  font-size: 10px; letter-spacing: 0.18em;
  color: rgba(200,136,30,0.6); text-transform: uppercase;
  font-family: 'Jost', sans-serif; font-weight: 400;
  margin-bottom: 12px; margin-top: 24px;
}
.profile-section-title:first-of-type { margin-top: 0; }

.profile-field {
  display: flex; flex-direction: column; gap: 5px;
  margin-bottom: 12px;
}
.profile-field label {
  font-size: 11px; color: rgba(255,255,255,0.3);
  font-family: 'Jost', sans-serif; letter-spacing: 0.06em;
}

<script>
/* ─── STARS ─── */
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 0.8 + 0.2,
        op: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame += 0.012;
    stars.forEach(s => {
      const o = (Math.sin(frame * s.speed * 60 + s.phase) + 1) / 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${o * 0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

let apiKey = localStorage.getItem('jakelu_api_key') || '';

const apiToggle = document.getElementById('api-toggle');
const apiPanel = document.getElementById('api-panel');
const apiKeyInput = document.getElementById('api-key-input');

if (apiKey) {
  apiKeyInput.value = apiKey;

  apiStatus.className = 'api-status ok';
}

apiToggle.addEventListener('click', () => {
  apiPanel.classList.toggle('open');
});

apiSave.addEventListener('click', () => {
  const val = apiKeyInput.value.trim();
  if (!val.startsWith('sk-ant-')) {
    apiStatus.textContent = 'invalid key format';
    apiStatus.className = 'api-status err';
    return;
  }
  apiKey = val;
  localStorage.setItem('jakelu_api_key', apiKey);

/* ─── PLATFORM LIST (names only — no hardcoded tactics) ─── */
const PLATFORM_NAMES = {
  soundcloud: 'SoundCloud',
  bandcamp: 'Bandcamp',
  reddit: 'Reddit',
  youtube: 'YouTube',
  pinterest: 'Pinterest',
  instagram: 'Instagram',
  facebook: 'Facebook',
  audius: 'Audius',
  tiktok: 'TikTok',
  twitter: 'Twitter / X',
  linkedin: 'LinkedIn',
  discord: 'Discord',
  substack: 'Substack',
  mixcloud: 'Mixcloud'
};

/* ─── DISCOVERY ENGINE (future) ─────────────────────────────────────────────
 *
 * PHASE 1 — Community Discovery
 * Before analysis, run a web_search layer to find live communities:
 *   - Active subreddits matching content identity (last post < 7 days)
 *   - Bandcamp tags with recent uploads in the same genre
 *   - YouTube channels with similar content, upload frequency > 2/month
 *   - Discord servers (via disboard.org search)
 *   - Pinterest boards actively repinned
 *
 * PHASE 2 — Noise Filter
 * Raw search results pass through a filter prompt before reaching strategy:
 *   Filter criteria (all must pass):
 *   [x] Active in last 30 days
 *   [x] Direct content identity match (not just genre — feel, tone, texture)
 *   [x] Community is organic (not ad-dominated or bot-heavy)
 *   [x] Open to external contributions (not invite-only or closed)
 *   Results failing any criterion are silently dropped — user never sees them.
 *
 * PHASE 3 — Momentum Detection
 * Among filtered results, score by:
 *   - Rising (trending up this week) > Stable > Declining
 *   - Prefer communities where similar content got traction in last 14 days
 *   - Flag "early" opportunities — active but underserved niche
 *
 * PHASE 4 — Gap Analysis
 * What exists vs. what's missing:
 *   - Identify content type gaps in discovered communities
 *   - Flag if Tagmac's content would be the first/only of its kind there
 *   - Surface untouched platforms where the audience exists but no one is reaching them
 *
 * PHASE 5 — Backlink Web
 * Every discovered community becomes a backlink node:
 *   - Each distribution point links back to casacaravan.space
 *   - Track which nodes generate return traffic (future: analytics integration)
 *   - Build spider web, not broadcast — each share connects to the next
 *
 * IMPLEMENTATION NOTES:
 *   - Two-call architecture: call 1 = discovery + filter, call 2 = strategy
 *   - Pass only filtered communities to call 2 (no noise in strategy prompt)
 *   - Cache filtered results per content fingerprint (avoid redundant searches)
 *   - Manual send always required for Reddit/Discord (bot detection)
 *   - Timing intelligence: inject platform-specific peak hours into copy
 *
 * ─────────────────────────────────────────────────────────────────────────── */

/* ─── ANALYZE ─── */
async function analyze(inputText) {
  if (!apiKey) {
    showToast('No API key — add it via the ⚙ icon bottom right');
    return;
  }

  setAnalyzing(true);
  document.getElementById('question-box').style.display = 'none';

  const profile = loadProfile();
  const profileContext = buildProfileContext(profile);

  const systemPrompt = `You are Jakelu — distribution intelligence for a specific creator. You know them. Every strategy is shaped by who they are.

${profileContext}

FUNDAMENTAL: Never distribute what you haven't understood. If content is unclear or a URL is inaccessible, ask — don't guess.
- Inaccessible URL (Instagram, Facebook, private) → {"error": "cannot_access", "message": "I can't see this. One line: what is it?"}
- Less than 80% confident AND no audio/image metadata present → {"error": "need_clarification", "message": "your specific question"}
- If AUDIO FILE metadata is present (duration, sample rate, BPM etc): proceed with strategy. Use the technical data plus the creator profile to build the distribution. Do NOT ask for clarification on audio files — the metadata is enough to work with.

DIMENSION DETECTION: Read the content and identify which dimension of this creator is speaking. Each dimension reaches different communities with different voices. The active dimension shapes everything.

LINK RULE: If the input contains a URL, that URL must appear in every platform's copy text — naturally embedded, not appended awkwardly. The link is the destination. Never omit it.
- Facebook suppresses external links — visual post + link in first comment
- Reddit requires genuine participation before sharing
- ${profile.site || 'casacaravan.space'} is always the destination

You are not limited to known platforms. Niche forums, Discord servers, newsletters — if it fits better, propose it.

Respond ONLY with valid JSON (no preamble, no backticks):

{"content_type":"precise description","content_summary":"1-2 sentences","active_dimension":"which dimension and why","audience":"specific, not generic","tone":"feeling/energy/texture","platforms":[{"id":"platform_id","name":"Platform Name","why":"why this dimension belongs here","how":"the exact move — not the principle","copy":"ready-to-use post text native to this platform","backlink_placement":"where ${profile.site || 'casacaravan.space'} goes","backlink_text":"exact text to copy"}],"seo_keywords":["k1","k2","k3","k4","k5"],"backlink_web":"how these placements build cumulative reach back to ${profile.site || 'casacaravan.space'}"}

3-5 platforms. Each choice must be earned.`;


  let result = null;

  try {
    setAnalyzingText('analyzing');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: inputText }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    result = JSON.parse(clean);

    // Handle clarification / cannot access
    if (result.error) {
      setAnalyzing(false);
      const msg = result.message || 'Tell me more about this content.';
      document.getElementById('question-text').textContent = msg;
      document.getElementById('question-box').style.display = 'flex';
      document.getElementById('question-answer').value = '';
      document.getElementById('question-answer').focus();
      return;
    }

  } catch (e) {
    setAnalyzing(false);
    showToast('Error: ' + (e.message || 'unknown'));
    console.error(e);
    return;
  }

  setAnalyzing(false);
  renderResult(result, inputText);
}

function setAnalyzing(on) {
  const bar = document.getElementById('analyzing-bar');
  const inputWrap = document.getElementById('input-wrap');
  if (on) {
    bar.classList.add('active');
    inputWrap.style.display = 'none';
  } else {
    bar.classList.remove('active');
    inputWrap.style.display = 'flex';
  }
}

function setAnalyzingText(t) {
  document.getElementById('analyzing-text').textContent = t;
}

/* ─── RENDER RESULT ─── */
function renderResult(r, originalInput) {
  currentResult = r;
  currentInput = originalInput;
  // Analysis card
  const analysisBody = document.getElementById('analysis-body');
  analysisBody.innerHTML = `
    <strong style="color: rgba(255,255,255,0.85); font-weight: 400;">${escHtml(r.content_type || '')}</strong>
    &nbsp;·&nbsp;
    ${escHtml(r.content_summary || '')}
    <br><br>
    ${r.active_dimension ? `<div style="font-size:12px;color:rgba(79,195,161,0.7);margin-bottom:6px;letter-spacing:0.02em;">↳ ${escHtml(r.active_dimension)}</div>` : ''}
    <span style="color: rgba(255,255,255,0.45); font-size: 12px;">

/* ─── FILE HANDLING ─── */
let attachedFile = null;
let attachedMeta = null;

const fileInput = document.getElementById('file-input');
const filePreview = document.getElementById('file-preview');
const filePreviewName = document.getElementById('file-preview-name');
const filePreviewIcon = document.getElementById('file-preview-icon');
const fileRemove = document.getElementById('file-remove');
const attachBtn = document.getElementById('attach-btn');

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  attachedFile = file;
  attachedMeta = null;

  const isAudio = file.type.startsWith('audio/');
  const isImage = file.type.startsWith('image/');

  filePreviewIcon.textContent = isAudio ? '♫' : '◻';
  filePreviewName.textContent = file.name;
  filePreview.style.display = 'flex';
  attachBtn.classList.add('has-file');

  if (isAudio) {
    filePreviewName.textContent = file.name + ' — analyzing...';
    attachedMeta = await analyzeAudio(file);
    filePreviewName.textContent = file.name + (attachedMeta ? ` — ${attachedMeta.duration}s · ${attachedMeta.bpm ? attachedMeta.bpm + ' bpm' : ''}` : '');
  }

  if (isImage) {
    attachedMeta = await analyzeImage(file);
  }

  fileInput.value = '';
});

fileRemove.addEventListener('click', () => {
  attachedFile = null;
  attachedMeta = null;
  filePreview.style.display = 'none';
  attachBtn.classList.remove('has-file');
});

async function analyzeAudio(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const actxA = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = await actxA.decodeAudioData(e.target.result);
        const duration = Math.round(buffer.duration);
        const sampleRate = buffer.sampleRate;
        const channels = buffer.numberOfChannels;

        // RMS energy — estimate quietness/density
        const data = buffer.getChannelData(0);
        let rms = 0;
        const step = Math.max(1, Math.floor(data.length / 2000));
        for (let i = 0; i < data.length; i += step) rms += data[i] * data[i];
        rms = Math.sqrt(rms / (data.length / step));

        // Energy profile — low/mid/high texture estimate
        const segCount = 10;
        const segLen = Math.floor(data.length / segCount);
        const segEnergies = [];
        for (let s = 0; s < segCount; s++) {
          let e = 0;
          for (let i = s * segLen; i < (s + 1) * segLen; i++) e += data[i] * data[i];
          segEnergies.push(Math.sqrt(e / segLen));
        }
        const maxSeg = Math.max(...segEnergies);
        const minSeg = Math.min(...segEnergies);
        const dynamicRange = maxSeg > 0 ? ((maxSeg - minSeg) / maxSeg).toFixed(2) : '0';

        // Rough BPM via onset detection
        let bpm = null;
        try {
          const windowSize = Math.floor(sampleRate * 0.01);
          const energies = [];
          for (let i = 0; i < data.length - windowSize; i += windowSize) {
            let e = 0;
            for (let j = 0; j < windowSize; j++) e += data[i+j] * data[i+j];
            energies.push(e);
          }
          const avg = energies.reduce((a,b) => a+b, 0) / energies.length;
          let onsets = 0;
          for (let i = 1; i < energies.length; i++) {
            if (energies[i] > avg * 1.5 && energies[i-1] <= avg * 1.5) onsets++;
          }
          const beatsPerSec = onsets / buffer.duration;
          bpm = Math.round(beatsPerSec * 60);
          if (bpm < 40 || bpm > 220) bpm = null;
        } catch(e) {}

        actxA.close();
        resolve({
          duration,
          sampleRate,
          channels,
          rms: rms.toFixed(3),
          dynamicRange,
          bpm,
          size: Math.round(file.size / 1024) + 'KB',
          format: file.type
        });
      } catch(err) {
        // fallback — still return basic info so Claude doesn't ask
        resolve({
          duration: '?',
          format: file.type,
          size: Math.round(file.size/1024) + 'KB',
          channels: '?',
          sampleRate: '?',
          rms: '?',
          dynamicRange: '?',
          bpm: null
        });
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function analyzeImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      resolve({
        width: img.naturalWidth,
        height: img.naturalHeight,
        size: Math.round(file.size / 1024) + 'KB',
        format: file.type
      });
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

function buildFileContext() {
  if (!attachedFile) return '';
  const isAudio = attachedFile.type.startsWith('audio/');
  const isImage = attachedFile.type.startsWith('image/');
  if (isAudio) {
    const m = attachedMeta || {};
    return `\n\n[AUDIO FILE: "${attachedFile.name}" · Duration: ${m.duration || '?'}s · Format: ${attachedFile.type} · Size: ${m.size || '?'} · Channels: ${m.channels || '?'} · Sample rate: ${m.sampleRate || '?'}Hz${m.bpm ? ' · Estimated BPM: ' + m.bpm : ''} · Energy (RMS): ${m.rms || '?'} · Dynamic range: ${m.dynamicRange || '?'}]`;
  }
  if (isImage) {
    const m = attachedMeta || {};
    return `\n\n[IMAGE FILE: "${attachedFile.name}" · Dimensions: ${m.width || '?'}×${m.height || '?'}px · Format: ${attachedFile.type} · Size: ${m.size || '?'}]`;
  }
  return '';
}

/* ─── 40Hz ─── */
let actx = null;
let osc40 = null;
let gain40 = null;
let soundOn = true;

function start40() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  gain40 = actx.createGain();
  gain40.gain.setValueAtTime(0, actx.currentTime);
  gain40.gain.linearRampToValueAtTime(0.5, actx.currentTime + 6);
  gain40.connect(actx.destination);
  osc40 = actx.createOscillator();
  osc40.type = 'sine';
  osc40.frequency.value = 40;
  osc40.connect(gain40);
  osc40.start();
}

function stop40() {
  if (!actx) return;
  gain40.gain.linearRampToValueAtTime(0, actx.currentTime + 2);
  setTimeout(() => { try { osc40.stop(); actx.close(); } catch(e){} actx = null; osc40 = null; gain40 = null; }, 2200);
}

/* auto-start on first user gesture */
function onFirstGesture() {
  start40();
  document.removeEventListener('click', onFirstGesture);
  document.removeEventListener('keydown', onFirstGesture);
}
document.addEventListener('click', onFirstGesture);
document.addEventListener('keydown', onFirstGesture);

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
