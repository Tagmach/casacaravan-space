<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Caravan Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0a0806; overflow:hidden; }

#canvas-wrap {
  width:100%; height:100%;
  display: flex;
  flex-direction: column;
}

canvas { display:block; flex:1; min-height:0; }

#header {
  flex-shrink:0;
  padding:16px 28px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid rgba(200,160,80,0.12);
  background:rgba(10,8,6,0.95);
  z-index:10;
}
#header-brand { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:3px; color:#D2C3AF; text-transform:uppercase; }
#header-tag { font-family:'Jost',sans-serif; font-size:10px; color:#7A7068; letter-spacing:1px; }
#header-about { margin-left:auto; font-family:'Jost',sans-serif; font-size:9px; letter-spacing:2.5px; color:#7A7068; text-transform:uppercase; text-decoration:none; transition:color 0.2s; border:1px solid #2E2A26; padding:6px 16px; border-radius:100px; }
#header-about:hover { color:#A08060; border-color:#A08060; }

#walk-controls {
  flex-shrink:0;
  padding:12px 0 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  background:rgba(10,8,6,0.95);
  border-top:1px solid rgba(62,56,48,0.8);
  z-index:10;
}
.walk-btn { width:44px; height:44px; border-radius:50%; border:1px solid #2E2A26; background:none; color:#7A7068; font-size:17px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
.walk-btn:hover { border-color:#A08060; color:#A08060; }
.walk-btn:disabled { opacity:0.2; cursor:default; }
#walk-dots { display:flex; gap:8px; align-items:center; }
.walk-dot { width:6px; height:6px; border-radius:50%; background:#2E2A26; cursor:pointer; transition:background 0.3s; }
.walk-dot.active { background:#A08060; }

#door-label { position:fixed; bottom:72px; left:50%; transform:translateX(-50%); font-family:'Cormorant Garamond',serif; font-size:13px; font-style:italic; letter-spacing:2px; color:#D2C3AF; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:10; white-space:nowrap; }
#door-label.show { opacity:1; }

#room-overlay { position:fixed; inset:0; background:rgba(10,8,6,0.97); display:none; align-items:center; justify-content:center; z-index:20; }
#room-overlay.open { display:flex; }
#room-content { text-align:center; max-width:420px; padding:40px; }
#room-name { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; color:#D2C3AF; letter-spacing:0.06em; margin-bottom:12px; }
#room-sub { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:3px; color:#7A7068; text-transform:uppercase; margin-bottom:32px; }
#room-back { font-family:'Jost',sans-serif; font-size:10px; letter-spacing:2px; color:#7A7068; text-transform:uppercase; background:none; border:1px solid #2E2A26; padding:10px 28px; border-radius:100px; cursor:pointer; transition:all 0.2s; }
#room-back:hover { border-color:#A08060; color:#A08060; }
</style>
</head>
<body>

<div id="canvas-wrap">
  <div id="header">
    <div id="header-brand">Casa Caravan Space</div>
    <div id="header-tag">· create with life</div>
    <a href="about.html" id="header-about">About</a>
  </div>
  <canvas id="c"></canvas>
  <div id="walk-controls">
    <button class="walk-btn" id="btnBack" disabled>&#8593;</button>
    <div id="walk-dots"></div>
    <button class="walk-btn" id="btnFwd">&#8595;</button>
  </div>
</div>

<div id="door-label"></div>

<div id="room-overlay">
  <div id="room-content">
    <div id="room-name">—</div>
    <div id="room-sub">coming soon</div>
    <button id="room-back" onclick="closeRoom()">&#8592; Back to corridor</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0806);
scene.fog = new THREE.FogExp2(0x0a0806, 0.032);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 60);
camera.position.set(0, 0, 1);

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w || !h) return;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ── DIMENSIONS ──────────────────────────────────────────────────
const W = 5, H = 4, L = 32;

// ── CORRIDOR WALLS ───────────────────────────────────────────────
function mat(hex, rough=0.95) {
  return new THREE.MeshStandardMaterial({ color:new THREE.Color(hex), roughness:rough });
}

const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, L), mat(0x221608, 0.98));
floor.rotation.x = -Math.PI/2;
floor.position.set(0, -H/2, -L/2);
scene.add(floor);

const ceil = new THREE.Mesh(new THREE.PlaneGeometry(W, L), mat(0x161008, 0.97));
ceil.rotation.x = Math.PI/2;
ceil.position.set(0, H/2, -L/2);
scene.add(ceil);

const wallL = new THREE.Mesh(new THREE.PlaneGeometry(L, H), mat(0x1a1208, 0.95));
wallL.rotation.y = Math.PI/2;
wallL.position.set(-W/2, 0, -L/2);
scene.add(wallL);

const wallR = new THREE.Mesh(new THREE.PlaneGeometry(L, H), mat(0x1a1208, 0.95));
wallR.rotation.y = -Math.PI/2;
wallR.position.set(W/2, 0, -L/2);
scene.add(wallR);

// Floor planks
for (let i=-2; i<=2; i++) {
  const p = new THREE.Mesh(new THREE.PlaneGeometry(0.04, L), mat(0x2a1c0a, 1));
  p.rotation.x = -Math.PI/2;
  p.position.set(i*(W/4), -H/2+0.001, -L/2);
  scene.add(p);
}

// ── LIGHTING ─────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x6a4a28, 1.8));
const mainLight = new THREE.DirectionalLight(0xd4a870, 1.4);
mainLight.position.set(0, 8, 4); scene.add(mainLight);
const fillLight = new THREE.DirectionalLight(0xd4a870, 0.9);
fillLight.position.set(0, 2, 6); scene.add(fillLight);

// Sconce lights — centered between windows, at window height
// Windows at z: -2,-6,-10,-14,-18,-22,-26,-30
// Between windows: -4,-8,-12,-16,-20,-24,-28
[-4, -8, -12, -16, -20, -24, -28].forEach(z => {
  [-W/2+0.08, W/2-0.08].forEach(x => {
    const l = new THREE.PointLight(0xf0b840, 1.8, 7);
    l.position.set(x, H/2-0.45, z); scene.add(l);
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,6),
      new THREE.MeshStandardMaterial({color:0xf8e060,emissive:0xf8e060,emissiveIntensity:3}));
    bulb.position.set(x, H/2-0.45, z); scene.add(bulb);
  });
});

// ── WINDOWS ──────────────────────────────────────────────────────
[-2,-6,-10,-14,-18,-22,-26,-30].forEach((wz, wi) => {
  [-W/2+0.02, W/2-0.02].forEach((wx, si) => {
    const isL = si===0, WW=0.7, WH=0.5, WY=H/2-0.45;
    const fm = mat(0x2a1808, 0.9);
    [[WW+0.06,0.05,0.05,0,WH/2+0.02,0],[WW+0.06,0.05,0.05,0,-WH/2-0.02,0],
     [0.05,WH+0.06,0.05,-WW/2-0.02,0,0],[0.05,WH+0.06,0.05,WW/2+0.02,0,0],
     [0.04,WH,0.04,0,0,0]].forEach(([gw,gh,gd,ox,oy,oz]) => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(gw,gh,gd),fm);
      m.rotation.y = isL?Math.PI/2:-Math.PI/2;
      m.position.set(wx,WY+oy,wz+oz); scene.add(m);
    });
    const sky = new THREE.Mesh(new THREE.PlaneGeometry(WW,WH),
      new THREE.MeshStandardMaterial({color:0x040810,emissive:new THREE.Color(0x0a1828),emissiveIntensity:0.8,side:THREE.DoubleSide}));
    sky.rotation.y = isL?Math.PI/2:-Math.PI/2;
    sky.position.set(isL?wx-0.02:wx+0.02,WY,wz); scene.add(sky);
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(WW,WH),
      new THREE.MeshStandardMaterial({color:0x6090b0,transparent:true,opacity:0.12,emissive:new THREE.Color(0x304868),emissiveIntensity:0.3,side:THREE.DoubleSide}));
    glass.rotation.y = isL?Math.PI/2:-Math.PI/2;
    glass.position.set(wx,WY,wz); scene.add(glass);
    const wl = new THREE.PointLight(0x5080a0, 0.25, 5);
    wl.position.set(isL?wx+0.8:wx-0.8, WY-0.3, wz); scene.add(wl);
    for (let s=0;s<4;s++){
      const star=new THREE.Mesh(new THREE.CircleGeometry(0.012,6),
        new THREE.MeshStandardMaterial({color:0xffffff,emissive:new THREE.Color(0xffffff),emissiveIntensity:2}));
      star.rotation.y=isL?Math.PI/2:-Math.PI/2;
      star.position.set(isL?wx-0.03:wx+0.03,WY+(Math.random()-0.5)*0.3,wz+(Math.random()-0.5)*0.5);
      scene.add(star);
    }
    if (wi===0&&isL){
      const moon=new THREE.Mesh(new THREE.CircleGeometry(0.06,16),
        new THREE.MeshStandardMaterial({color:0xf8f0d8,emissive:new THREE.Color(0xf8f0d8),emissiveIntensity:3.5}));
      moon.rotation.y=Math.PI/2;
      moon.position.set(wx-0.03,WY+0.1,wz+0.15); scene.add(moon);
    }
  });
});

// ── DOORS ─────────────────────────────────────────────────────────
const doors = [
  {name:'Audio Sanctuary',color:0xc89030,border:0xe8a830,z:-2, side:'L',action:'sanctuary'},
  {name:'Fermentation Lab',color:0x5a9030,border:0x70b040,z:-2, side:'R',action:'fermentation'},
  {name:'Games',           color:0x8060c0,border:0x9070d0,z:-10,side:'L',action:'games'},
  {name:'Headspace',       color:0x4060a0,border:0x6090c0,z:-10,side:'R',action:'headspace'},
  {name:'Idea Basket',     color:0xc06030,border:0xd07040,z:-18,side:'L',action:'soon'},
  {name:'Herbal Atelier',  color:0x508028,border:0x78b038,z:-18,side:'R',action:'soon'},
];

const DW=2.2, DH=2.8;
const doorMeshes=[], billboardSigns=[];

doors.forEach(d => {
  const px = d.side==='L' ? -W/2+0.02 : W/2-0.02;
  const rotY = d.side==='L' ? Math.PI/2 : -Math.PI/2;
  const py = -H/2 + DH/2;
  const bc = new THREE.Color(d.border);

  // Frame — top + sides only (no bottom, z-fighting with floor)
  const fmat = new THREE.MeshStandardMaterial({color:bc,roughness:0.7,metalness:0.1});
  // Top bar
  const ftop=new THREE.Mesh(new THREE.BoxGeometry(DW+0.1,0.06,0.06),fmat);
  ftop.rotation.y=rotY; ftop.position.set(px,py+DH/2+0.035,d.z+0.03); scene.add(ftop);
  // Side bars
  [[-DW/2-0.035],[DW/2+0.035]].forEach(([oz])=>{
    const b=new THREE.Mesh(new THREE.BoxGeometry(0.06,DH+0.06,0.06),fmat);
    b.rotation.y=rotY; b.position.set(px,py,d.z+oz); scene.add(b);
  });

  // Surface
  const surf=new THREE.Mesh(new THREE.PlaneGeometry(DW,DH),
    new THREE.MeshStandardMaterial({color:new THREE.Color(d.color).multiplyScalar(0.1),roughness:0.92}));
  surf.rotation.y=rotY; surf.position.set(px,py,d.z+0.08);
  surf.userData={door:d}; scene.add(surf); doorMeshes.push(surf);

  // Knob
  const knob=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),
    new THREE.MeshStandardMaterial({color:bc,metalness:0.8,roughness:0.2,emissive:bc,emissiveIntensity:0.3}));
  knob.position.set(d.side==='L'?px+0.08:px-0.08, py-0.1, d.z+0.05); scene.add(knob);

  // Glow
  const gl=new THREE.PointLight(bc,0.5,3);
  gl.position.set(d.side==='L'?px+0.8:px-0.8,py,d.z); scene.add(gl);

  // Crack
  const crack=new THREE.Mesh(new THREE.PlaneGeometry(0.018,DH*0.72),
    new THREE.MeshStandardMaterial({color:bc,emissive:bc,emissiveIntensity:0.6}));
  crack.rotation.y=rotY; crack.position.set(d.side==='L'?px+0.01:px-0.01,py,d.z+0.09); scene.add(crack);

  // Sign — canvas, Cormorant Garamond
  const sc=document.createElement('canvas');
  sc.width=1024; sc.height=512;
  const ctx=sc.getContext('2d');
  ctx.fillStyle='#0a0806'; ctx.fillRect(0,0,1024,512);
  const hex='#'+bc.getHexString();
  ctx.strokeStyle=hex; ctx.lineWidth=4; ctx.strokeRect(8,8,1008,496);
  ctx.lineWidth=1.5; ctx.strokeStyle=hex+'55'; ctx.strokeRect(18,18,988,476);
  ctx.fillStyle='#D2C3AF'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const words=d.name.split(' ');
  if(words.length===1){ctx.font='300 120px "Cormorant Garamond",serif';ctx.fillText(words[0],512,256);}
  else if(words.length===2){ctx.font='300 96px "Cormorant Garamond",serif';ctx.fillText(words[0],512,185);ctx.fillText(words[1],512,330);}
  else{const mid=Math.ceil(words.length/2);ctx.font='300 80px "Cormorant Garamond",serif';ctx.fillText(words.slice(0,mid).join(' '),512,185);ctx.fillText(words.slice(mid).join(' '),512,310);}
  ctx.strokeStyle=hex; ctx.lineWidth=3; ctx.globalAlpha=0.35;
  ctx.beginPath(); ctx.moveTo(140,420); ctx.lineTo(884,420); ctx.stroke(); ctx.globalAlpha=1;
  const tex=new THREE.CanvasTexture(sc); tex.needsUpdate=true;
  const sign=new THREE.Mesh(new THREE.PlaneGeometry(1.8,0.9),
    new THREE.MeshStandardMaterial({map:tex,emissiveMap:tex,emissive:new THREE.Color(0xffffff),emissiveIntensity:1.6}));
  const sx=d.side==='L'?-1.0:1.0;
  sign.position.set(sx,0.3,d.z-0.3); scene.add(sign); billboardSigns.push(sign);
});

// ── GARDEN DOOR ───────────────────────────────────────────────────
const GW=W*0.68, GH=2.8, GZ=-L+0.2, gpy=-H/2+GH/2;

// Frame
const gfm=new THREE.MeshStandardMaterial({color:0x3a2810,roughness:0.6,metalness:0.2});
[[GW+0.1,0.07,0.07,0,GH/2+0.035,0.035],[GW+0.1,0.07,0.07,0,-GH/2-0.035,0.035],
 [0.07,GH+0.07,0.07,-GW/2-0.035,0,0.035],[0.07,GH+0.07,0.07,GW/2+0.035,0,0.035],
 [0.05,GH,0.05,0,0,0.035],[GW,0.05,0.05,0,0,0.035]
].forEach(([fw,fh,fd,ox,oy,oz])=>{
  const b=new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd),gfm);
  b.position.set(ox,gpy+oy,GZ+oz); scene.add(b);
});

// Night sky
const ns=new THREE.Mesh(new THREE.PlaneGeometry(GW,GH),
  new THREE.MeshStandardMaterial({color:0x020408,emissive:new THREE.Color(0x040810),emissiveIntensity:2.2}));
ns.position.set(0,gpy,GZ-0.5); scene.add(ns);

// Trees
[-0.8,-0.05,0.72,-0.42,0.38].forEach((tx,ti)=>{
  const s=0.55+ti*0.06;
  const tr=new THREE.Mesh(new THREE.BoxGeometry(0.07*s,0.44*s,0.05),new THREE.MeshStandardMaterial({color:0x050c03}));
  tr.position.set(tx,-H/2+0.22*s,GZ-0.35); scene.add(tr);
  const cr=new THREE.Mesh(new THREE.SphereGeometry(0.25*s,7,5),new THREE.MeshStandardMaterial({color:0x091504}));
  cr.position.set(tx,-H/2+0.66*s,GZ-0.35); scene.add(cr);
});

// Moon
const gMoon=new THREE.Mesh(new THREE.CircleGeometry(0.1,14),
  new THREE.MeshStandardMaterial({color:0xf8f0d8,emissive:new THREE.Color(0xf8f0d8),emissiveIntensity:2}));
gMoon.position.set(-0.45,gpy+0.5,GZ-0.28); scene.add(gMoon);

// Fireflies
const ffArr=[];
for(let i=0;i<14;i++) ffArr.push((Math.random()-0.5)*GW*0.6,-H/2+0.2+Math.random()*GH*0.65,GZ-0.1-Math.random()*0.35);
const ffGeo=new THREE.BufferGeometry();
ffGeo.setAttribute('position',new THREE.Float32BufferAttribute(ffArr,3));
const ff=new THREE.Points(ffGeo,new THREE.PointsMaterial({color:0xc8e040,size:0.04,transparent:true,opacity:0.8}));
scene.add(ff);

// Glass
const gGlass=new THREE.Mesh(new THREE.PlaneGeometry(GW,GH),
  new THREE.MeshStandardMaterial({color:0x182030,transparent:true,opacity:0.15,emissive:new THREE.Color(0x040c18),emissiveIntensity:1.0,side:THREE.DoubleSide}));
gGlass.position.set(0,gpy,GZ+0.01); scene.add(gGlass);

// Glow
const gGlow=new THREE.PointLight(0x102008,1.2,10);
gGlow.position.set(0,0,GZ+0.5); scene.add(gGlow);

// Clickable
const gClick=new THREE.Mesh(new THREE.PlaneGeometry(GW,GH),
  new THREE.MeshStandardMaterial({transparent:true,opacity:0}));
gClick.position.set(0,gpy,GZ+0.02);
gClick.userData={door:{name:'The Garden',action:'garden'}};
scene.add(gClick); doorMeshes.push(gClick);

// Garden sign
const gsC=document.createElement('canvas');
gsC.width=768; gsC.height=200;
const gsX=gsC.getContext('2d');
gsX.fillStyle='rgba(8,7,6,0.85)'; gsX.fillRect(0,0,768,200);
gsX.strokeStyle='#A08060'; gsX.lineWidth=1.2; gsX.strokeRect(7,7,754,186);
[[7,7],[761,7],[7,193],[761,193]].forEach(([cx,cy])=>{
  gsX.strokeStyle='#A08060'; gsX.beginPath();
  gsX.moveTo(cx+(cx<384?11:-11),cy); gsX.lineTo(cx,cy); gsX.lineTo(cx,cy+(cy<100?11:-11)); gsX.stroke();
});
gsX.fillStyle='#D2C3AF'; gsX.font='300 92px "Cormorant Garamond",serif';
gsX.textAlign='center'; gsX.textBaseline='middle';
gsX.fillText('The Garden',384,90);
gsX.strokeStyle='#A08060'; gsX.lineWidth=0.8; gsX.globalAlpha=0.3;
gsX.beginPath(); gsX.moveTo(150,148); gsX.lineTo(618,148); gsX.stroke(); gsX.globalAlpha=1;
const gsTex=new THREE.CanvasTexture(gsC); gsTex.needsUpdate=true;
const gSign=new THREE.Mesh(new THREE.PlaneGeometry(GW*0.88,0.48),
  new THREE.MeshStandardMaterial({map:gsTex,emissiveMap:gsTex,emissive:new THREE.Color(0xffffff),emissiveIntensity:2.5}));
gSign.position.set(0,gpy+GH/2+0.34,GZ+0.04); scene.add(gSign);

// ── WALK ─────────────────────────────────────────────────────────
const POSITIONS=[1,-6,-14,-20];
let cur=0, tgtZ=POSITIONS[0];

function buildDots(){
  const el=document.getElementById('walk-dots'); el.innerHTML='';
  POSITIONS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='walk-dot'+(i===0?' active':''); d.id='wd'+i;
    d.onclick=()=>walkTo(i); el.appendChild(d);
  });
}
function walkTo(i){
  if(i<0||i>=POSITIONS.length)return;
  cur=i; tgtZ=POSITIONS[i];
  document.getElementById('btnBack').disabled=i<=0;
  document.getElementById('btnFwd').disabled=i>=POSITIONS.length-1;
  POSITIONS.forEach((_,j)=>{const d=document.getElementById('wd'+j);if(d)d.className='walk-dot'+(j===i?' active':'');});
}
document.getElementById('btnFwd').onclick=()=>walkTo(cur+1);
document.getElementById('btnBack').onclick=()=>walkTo(cur-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='ArrowRight')walkTo(cur+1);
  if(e.key==='ArrowDown'||e.key==='ArrowLeft')walkTo(cur-1);
});

// ── RAYCASTING ───────────────────────────────────────────────────
const ray=new THREE.Raycaster(), mv=new THREE.Vector2();
const lbl=document.getElementById('door-label');
function ndc(e){const r=canvas.getBoundingClientRect();return{x:((e.clientX-r.left)/r.width)*2-1,y:-((e.clientY-r.top)/r.height)*2+1};}
canvas.addEventListener('mousemove',e=>{
  const m=ndc(e); mv.set(m.x,m.y); ray.setFromCamera(mv,camera);
  const h=ray.intersectObjects(doorMeshes);
  if(h.length&&h[0].object.userData.door){lbl.textContent=h[0].object.userData.door.name;lbl.classList.add('show');canvas.style.cursor='pointer';}
  else{lbl.classList.remove('show');canvas.style.cursor='default';}
});
canvas.addEventListener('click',e=>{
  const m=ndc(e); mv.set(m.x,m.y); ray.setFromCamera(mv,camera);
  const h=ray.intersectObjects(doorMeshes);
  if(h.length&&h[0].object.userData.door)openD(h[0].object.userData.door);
});
canvas.addEventListener('touchend',e=>{
  const m=ndc(e.changedTouches[0]); mv.set(m.x,m.y); ray.setFromCamera(mv,camera);
  const h=ray.intersectObjects(doorMeshes);
  if(h.length&&h[0].object.userData.door)openD(h[0].object.userData.door);
},{passive:true});

function openD(d){
  if(d.action==='sanctuary'){window.location.href='index.html#sanctuary';return;}
  if(d.action==='garden'){window.location.href='garden.html';return;}
  if(d.action==='games'){window.location.href='games.html';return;}
  if(d.action==='headspace'){window.location.href='headspace.html';return;}
  if(d.action==='fermentation'){window.location.href='fermentation_lab.html';return;}
  document.getElementById('room-name').textContent=d.name;
  document.getElementById('room-overlay').classList.add('open');
}
function closeRoom(){document.getElementById('room-overlay').classList.remove('open');}

// ── ANIMATE ──────────────────────────────────────────────────────
const clk=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clk.getDelta(), e=clk.elapsedTime;
  camera.position.z+=(tgtZ-camera.position.z)*Math.min(t*3.5,0.1);
  camera.position.y=Math.sin(e*0.3)*0.01;
  billboardSigns.forEach(s=>s.quaternion.copy(camera.quaternion));
  ff.material.opacity=0.35+Math.sin(e*2.3)*0.4;
  gMoon.material.emissiveIntensity=3.5+Math.sin(e*0.7)*0.6;
  renderer.render(scene,camera);
}

document.fonts.load('300 80px "Cormorant Garamond"').then(()=>{
  buildDots(); resize(); animate();
}).catch(()=>{buildDots();resize();animate();});
