<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Forest — Casa Caravan Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020804;font-family:'Jost',sans-serif;}

/* ── CANVAS ── */
#c{position:fixed;inset:0;z-index:0;}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:16px 28px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,rgba(2,8,4,0.85),transparent);
}
#hdr-brand{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;color:#D2C3AF;text-transform:uppercase;}
#hdr-back{
  margin-left:auto;font-size:9px;letter-spacing:2px;color:#7A7068;
  text-transform:uppercase;border:1px solid #2E2A26;padding:6px 16px;
  border-radius:100px;transition:all 0.2s;background:none;cursor:pointer;
  font-family:'Jost',sans-serif;
}
#hdr-back:hover{border-color:#A08060;color:#A08060;}

/* ── CENTER TEXT ── */
#center{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;pointer-events:none;
}
#center-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(13px,2vw,18px);font-weight:300;font-style:italic;
  color:rgba(194,179,159,0);
  letter-spacing:0.1em;line-height:1.8;
  animation: fadeWords 3s ease forwards 2.5s;
}
@keyframes fadeWords{
  to{color:rgba(194,179,159,0.7);}
}

/* ── BOTTOM ── */
#bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:32px 28px 28px;
  background:linear-gradient(to top,rgba(2,8,4,0.9) 60%,transparent);
  text-align:center;
}
#bottom-label{
  font-size:8px;letter-spacing:3px;color:rgba(74,122,26,0.5);
  text-transform:uppercase;margin-bottom:14px;
  animation:fadeIn 1s ease forwards 4s;opacity:0;
}
#bottom-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.8vw,26px);font-weight:300;font-style:italic;
  color:rgba(194,179,159,0);line-height:1.7;margin-bottom:24px;
  animation:fadeIn 1.5s ease forwards 4.5s;
}
#bottom-btn{
  font-family:'Jost',sans-serif;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;padding:11px 32px;
  background:none;border:1px solid rgba(74,122,26,0.4);
  color:rgba(74,122,26,0.5);border-radius:100px;cursor:pointer;
  transition:all 0.4s;
  animation:fadeIn 1s ease forwards 6s;opacity:0;
}
#bottom-btn:hover{border-color:#7ab040;color:#7ab040;}
@keyframes fadeIn{to{opacity:1;color:rgba(194,179,159,0.8);}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hdr">
  <div id="hdr-brand">Casa Caravan Space</div>
  <button id="hdr-back" onclick="history.back()">← Garden</button>
</div>

<div id="center">
  <div id="center-title">
    Turn off the light.<br>
    Wait.<br>
    Your sight will return.
  </div>
</div>

<div id="bottom">
  <div id="bottom-label">The Forest</div>
  <div id="bottom-text">
    "The path was there all along.<br>
    You just needed the dark to see it."
  </div>
  <button id="bottom-btn" onclick="history.back()">Not yet. Back to the garden.</button>
</div>

<script>
// ── DOMAIN LOCK ───────────────────────────────────────────────────
(function(){
  const ok=['casacaravan.space','localhost','127.0.0.1','claudeusercontent.com'];
  const h=location.hostname;
  fetch('https://casacaravan.space/beacon?ref='+encodeURIComponent(h)+'&page='+encodeURIComponent(location.pathname),{mode:'no-cors'}).catch(()=>{});
  if(!ok.some(a=>h.includes(a))){
    setTimeout(()=>{document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#020804;font-family:serif;color:#4a7a1a;font-size:18px;letter-spacing:2px;">casacaravan.space</div>';setTimeout(()=>location.href='https://casacaravan.space',2000);},100);
  }
})();

// ── CANVAS — jungle night ─────────────────────────────────────────
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;
let fireflies = [];
let leaves = [];
let t = 0;

function resize(){
  W = cv.width  = innerWidth;
  H = cv.height = innerHeight;
  initScene();
}

function initScene(){
  // Fireflies
  fireflies = [];
  for(let i=0; i<28; i++){
    fireflies.push({
      x: Math.random()*W,
      y: H*0.2 + Math.random()*H*0.65,
      blink: Math.random()*Math.PI*2,
      blinkSpeed: 0.4 + Math.random()*1.2,
      size: 1.2 + Math.random()*1.8,
      vx: (Math.random()-0.5)*0.3,
      vy: (Math.random()-0.5)*0.15,
      hue: 80 + Math.random()*30 // yellow-green
    });
  }

  // Background leaf layers (silhouettes)
  leaves = [];
  // Generate tree silhouettes
  const treePositions = [
    {x:W*.08, scale:1.3}, {x:W*.18, scale:1.0},
    {x:W*.28, scale:1.5}, {x:W*.42, scale:0.9},
    {x:W*.58, scale:1.1}, {x:W*.72, scale:1.4},
    {x:W*.82, scale:1.0}, {x:W*.92, scale:1.2},
  ];
  treePositions.forEach(t=>{
    leaves.push({type:'tree', x:t.x, scale:t.scale, sway:Math.random()*Math.PI*2});
  });
}

function drawBackground(){
  // Deep jungle night sky
  const skyGrad = ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0, '#010603');
  skyGrad.addColorStop(0.4, '#020b04');
  skyGrad.addColorStop(0.7, '#030e05');
  skyGrad.addColorStop(1, '#010603');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,H);

  // Subtle moonlight — diffuse glow upper right
  const moonGrad = ctx.createRadialGradient(W*0.72, H*0.08, 0, W*0.72, H*0.08, H*0.5);
  moonGrad.addColorStop(0, 'rgba(180,220,160,0.06)');
  moonGrad.addColorStop(0.4, 'rgba(100,160,80,0.03)');
  moonGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = moonGrad;
  ctx.fillRect(0,0,W,H);

  // Moon itself
  ctx.beginPath();
  ctx.arc(W*0.72, H*0.09, H*0.028, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(240,255,220,0.7)';
  ctx.fill();
  // Moon glow
  const mg = ctx.createRadialGradient(W*0.72, H*0.09, 0, W*0.72, H*0.09, H*0.08);
  mg.addColorStop(0, 'rgba(200,240,180,0.25)');
  mg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mg;
  ctx.fillRect(0,0,W,H);
}

function drawTree(tree){
  const elapsed = t * 0.0008;
  const sway = Math.sin(elapsed + tree.sway) * 2;

  ctx.save();
  ctx.translate(tree.x + sway * tree.scale, H);

  // Trunk
  const th = H * 0.38 * tree.scale;
  const tw = H * 0.018 * tree.scale;
  ctx.fillStyle = 'rgba(3,12,2,0.95)';
  ctx.beginPath();
  ctx.rect(-tw/2, -th, tw, th);
  ctx.fill();

  // Crown layers — multiple ellipses
  const crowns = [
    {y:-th*0.7, rx:H*0.08*tree.scale, ry:H*0.12*tree.scale, alpha:0.92},
    {y:-th*0.88, rx:H*0.06*tree.scale, ry:H*0.10*tree.scale, alpha:0.88},
    {y:-th*1.02, rx:H*0.045*tree.scale, ry:H*0.08*tree.scale, alpha:0.82},
    {y:-th*1.12, rx:H*0.03*tree.scale, ry:H*0.055*tree.scale, alpha:0.7},
  ];

  crowns.forEach(cr=>{
    ctx.beginPath();
    ctx.ellipse(sway*0.3, cr.y, cr.rx, cr.ry, 0, 0, Math.PI*2);
    ctx.fillStyle = `rgba(3,10,2,${cr.alpha})`;
    ctx.fill();
  });

  ctx.restore();
}

function drawForeground(){
  // Dense dark undergrowth at bottom
  const groundGrad = ctx.createLinearGradient(0, H*0.75, 0, H);
  groundGrad.addColorStop(0, 'rgba(2,8,2,0)');
  groundGrad.addColorStop(0.4, 'rgba(2,8,2,0.7)');
  groundGrad.addColorStop(1, 'rgba(1,5,1,1)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H*0.75, W, H*0.25);

  // Foreground leaves silhouette — large irregular shapes
  ctx.fillStyle = 'rgba(2,9,2,0.95)';

  // Left foreground
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H*0.55);
  ctx.bezierCurveTo(W*0.05, H*0.42, W*0.12, H*0.48, W*0.08, H*0.62);
  ctx.bezierCurveTo(W*0.15, H*0.52, W*0.22, H*0.58, W*0.18, H*0.72);
  ctx.lineTo(W*0.25, H);
  ctx.fill();

  // Right foreground
  ctx.beginPath();
  ctx.moveTo(W, H);
  ctx.lineTo(W, H*0.5);
  ctx.bezierCurveTo(W*0.92, H*0.4, W*0.85, H*0.46, W*0.88, H*0.6);
  ctx.bezierCurveTo(W*0.82, H*0.5, W*0.75, H*0.56, W*0.78, H*0.7);
  ctx.lineTo(W*0.72, H);
  ctx.fill();

  // Center path — slightly lighter, sense of depth
  const pathGrad = ctx.createLinearGradient(0, H*0.6, 0, H);
  pathGrad.addColorStop(0, 'rgba(8,22,6,0.3)');
  pathGrad.addColorStop(1, 'rgba(4,12,3,0.6)');
  ctx.fillStyle = pathGrad;
  ctx.beginPath();
  ctx.moveTo(W*0.35, H);
  ctx.bezierCurveTo(W*0.38, H*0.8, W*0.44, H*0.72, W*0.5, H*0.6);
  ctx.bezierCurveTo(W*0.56, H*0.72, W*0.62, H*0.8, W*0.65, H);
  ctx.fill();
}

function drawFireflies(){
  const elapsed = t * 0.001;
  fireflies.forEach(ff=>{
    // Move
    ff.x += ff.vx;
    ff.y += ff.vy;
    ff.vx += (Math.random()-0.5)*0.04;
    ff.vy += (Math.random()-0.5)*0.02;
    ff.vx *= 0.98; ff.vy *= 0.98;
    if(ff.x<0||ff.x>W) ff.vx*=-1;
    if(ff.y<H*0.15||ff.y>H*0.82) ff.vy*=-1;

    // Blink
    const blink = Math.sin(elapsed*ff.blinkSpeed + ff.blink);
    const opacity = Math.max(0, blink) * 0.85;
    if(opacity < 0.05) return;

    const r = ff.size * (0.8 + blink*0.4);

    // Glow
    const grd = ctx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, r*8);
    grd.addColorStop(0, `hsla(${ff.hue},80%,65%,${opacity*0.9})`);
    grd.addColorStop(0.3, `hsla(${ff.hue},70%,55%,${opacity*0.3})`);
    grd.addColorStop(1, `hsla(${ff.hue},60%,40%,0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ff.x, ff.y, r*8, 0, Math.PI*2);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(ff.x, ff.y, r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${ff.hue},90%,80%,${opacity})`;
    ctx.fill();
  });
}

function drawVignette(){
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.72)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);
}

function loop(){
  t++;
  drawBackground();
  leaves.forEach(l=>{ if(l.type==='tree') drawTree(l); });
  drawForeground();
  drawFireflies();
  drawVignette();
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
loop();
</script>
</body>
</html>
