<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Forest — Casa Caravan Space</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#010402;}
#c{display:block;position:fixed;inset:0;}
#hdr{position:fixed;top:0;left:0;right:0;z-index:10;padding:16px 28px;display:flex;align-items:center;background:linear-gradient(to bottom,rgba(1,4,2,0.8),transparent);}
#hdr-brand{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;color:rgba(212,194,175,0.6);text-transform:uppercase;}
#hdr-back{margin-left:auto;font-size:9px;letter-spacing:2px;color:rgba(120,110,100,0.6);text-transform:uppercase;border:1px solid rgba(46,42,38,0.4);padding:6px 16px;border-radius:100px;background:none;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.3s;}
#hdr-back:hover{border-color:rgba(160,128,96,0.6);color:rgba(160,128,96,0.8);}
#words{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2.2vw,20px);font-weight:300;font-style:italic;color:rgba(194,179,159,0);line-height:2;animation:fw 2.5s ease forwards 3s;}
@keyframes fw{to{color:rgba(194,179,159,0.6);}}
#btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;padding:10px 28px;background:none;border:1px solid rgba(74,122,26,0.3);color:rgba(74,122,26,0);border-radius:100px;cursor:pointer;transition:all 0.4s;animation:fb 1s ease forwards 6s;}
@keyframes fb{to{color:rgba(116,176,40,0.55);border-color:rgba(74,122,26,0.4);}}
#btn:hover{border-color:rgba(122,176,60,0.8)!important;color:rgba(160,220,80,0.9)!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hdr">
  <div id="hdr-brand">Casa Caravan Space</div>
  <button id="hdr-back" onclick="history.back()">← Garden</button>
</div>
<div id="words">Turn off the light.<br>Wait.<br>Your sight will return.</div>
<button id="btn" onclick="history.back()">Not yet. Back to the garden.</button>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');

// resize canvas
cv.width  = window.innerWidth;
cv.height = window.innerHeight;
window.addEventListener('resize', () => {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
});

const W = () => cv.width;
const H = () => cv.height;

// fireflies
const FF = [];
for(let i=0;i<30;i++) FF.push({
  x: Math.random(), y: 0.15+Math.random()*0.65,
  blink: Math.random()*Math.PI*2, bs: 0.4+Math.random()*1.2,
  sz: 1+Math.random()*2,
  vx:(Math.random()-0.5)*0.0003, vy:(Math.random()-0.5)*0.0002,
  hue:75+Math.random()*35
});

let frame=0;

function draw(){
  const w=W(), h=H(), t=frame;

  // Sky
  const sky=cx.createLinearGradient(0,0,0,h);
  sky.addColorStop(0,'#010302');
  sky.addColorStop(0.5,'#020804');
  sky.addColorStop(1,'#010402');
  cx.fillStyle=sky; cx.fillRect(0,0,w,h);

  // Moon glow
  const mg=cx.createRadialGradient(w*.68,h*.07,0,w*.68,h*.07,h*.45);
  mg.addColorStop(0,'rgba(150,210,120,0.08)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=mg; cx.fillRect(0,0,w,h);

  // Moon
  cx.beginPath(); cx.arc(w*.68,h*.07,h*.022,0,Math.PI*2);
  cx.fillStyle='rgba(225,248,205,0.72)'; cx.fill();

  // Stars
  if(!draw._s){draw._s=[];for(let i=0;i<70;i++) draw._s.push([Math.random()*w,Math.random()*h*.5,Math.random()<.8?.4:.8,Math.random()*.4+.1,Math.random()*.8+.3]);}
  draw._s.forEach(s=>{
    cx.beginPath();cx.arc(s[0],s[1],s[2],0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${s[3]*(0.5+0.5*Math.sin(t*.001*s[4]))})`;
    cx.fill();
  });

  // ── TREES — 3 depth layers ──────────────────────────────────────
  function tree(x, groundY, trunkH, trunkW, crownW, crownH, crowns, dark, alpha, sway){
    const sw = Math.sin(t*.0008 + sway)*1.5;
    cx.fillStyle=`rgba(${dark},${dark*.4},${dark*.2},${alpha})`;
    // trunk
    cx.fillRect(x-trunkW/2+sw, groundY-trunkH, trunkW, trunkH);
    // crowns stacked
    for(let c=0;c<crowns;c++){
      const p=c/crowns;
      const cy2=groundY-trunkH*(0.5+p*.55);
      const rx=crownW*(1-p*.3);
      const ry=crownH*(0.9-p*.15);
      cx.beginPath();
      cx.ellipse(x+sw*(0.3+p*.4),cy2,rx,ry,0,0,Math.PI*2);
      cx.fillStyle=`rgba(${dark},${dark*.4},${dark*.2},${alpha*(0.8+p*.18)})`;
      cx.fill();
    }
  }

  // Far layer — small, pale
  const farTrees=[.05,.13,.21,.30,.38,.5,.6,.7,.78,.86,.94];
  farTrees.forEach((xp,i)=>{
    tree(w*xp, h*.7, h*.16+i%3*h*.04, w*.005, w*.022, h*.07, 3, 5, .55, i*1.3);
  });

  // Mid layer
  const midTrees=[.04,.14,.25,.36,.5,.64,.75,.86,.95];
  midTrees.forEach((xp,i)=>{
    tree(w*xp, h*.78, h*.26+i%3*h*.06, w*.008, w*.038, h*.11, 4, 4, .78, i*1.7+2);
  });

  // Near layer — large dark
  [[.0,.85],[.08,.9],[.16,.82],[.18,.88],[.72,.84],[.8,.9],[.88,.82],[.96,.88]].forEach(([xp,gy],i)=>{
    tree(w*xp, h*gy, h*(.42+i%2*.12), w*.013, w*.06, h*.18, 5, 3, .93, i*2.1+4);
  });

  // ── PATH ──
  const path=cx.createLinearGradient(0,h*.6,0,h);
  path.addColorStop(0,'rgba(6,18,4,0)');
  path.addColorStop(.5,'rgba(5,14,3,.35)');
  path.addColorStop(1,'rgba(2,8,2,.65)');
  cx.fillStyle=path;
  cx.beginPath();
  cx.moveTo(w*.38,h); cx.bezierCurveTo(w*.42,h*.82,w*.47,h*.72,w*.5,h*.62);
  cx.bezierCurveTo(w*.53,h*.72,w*.58,h*.82,w*.62,h);
  cx.fill();

  // ── FOREGROUND EDGES ──
  cx.fillStyle='rgba(1,4,1,.96)';
  // left
  cx.beginPath(); cx.moveTo(0,h); cx.lineTo(0,h*.35);
  cx.bezierCurveTo(w*.06,h*.22,w*.12,h*.3,w*.1,h*.48);
  cx.bezierCurveTo(w*.16,h*.38,w*.22,h*.44,w*.2,h*.6);
  cx.bezierCurveTo(w*.25,h*.52,w*.3,h*.58,w*.27,h*.75);
  cx.lineTo(w*.3,h); cx.fill();
  // right
  cx.beginPath(); cx.moveTo(w,h); cx.lineTo(w,h*.32);
  cx.bezierCurveTo(w*.94,h*.2,w*.88,h*.28,w*.9,h*.46);
  cx.bezierCurveTo(w*.85,h*.36,w*.78,h*.42,w*.82,h*.58);
  cx.bezierCurveTo(w*.76,h*.5,w*.7,h*.56,w*.74,h*.72);
  cx.lineTo(w*.7,h); cx.fill();

  // ground
  const gnd=cx.createLinearGradient(0,h*.8,0,h);
  gnd.addColorStop(0,'rgba(1,4,1,0)'); gnd.addColorStop(1,'rgba(1,3,1,1)');
  cx.fillStyle=gnd; cx.fillRect(0,h*.8,w,h*.2);

  // ── FIREFLIES ──
  FF.forEach(ff=>{
    ff.x+=ff.vx; ff.y+=ff.vy;
    ff.vx+=(Math.random()-.5)*.00008; ff.vy+=(Math.random()-.5)*.00005;
    ff.vx*=.98; ff.vy*=.98;
    if(ff.x<.1||ff.x>.9) ff.vx*=-1;
    if(ff.y<.12||ff.y>.78) ff.vy*=-1;
    const blink=Math.max(0,Math.sin(t*.001*ff.bs+ff.blink));
    if(blink<.06) return;
    const fx=ff.x*w, fy=ff.y*h;
    const g=cx.createRadialGradient(fx,fy,0,fx,fy,ff.sz*9);
    g.addColorStop(0,`hsla(${ff.hue},80%,68%,${blink*.8})`);
    g.addColorStop(.3,`hsla(${ff.hue},70%,50%,${blink*.2})`);
    g.addColorStop(1,'hsla(0,0%,0%,0)');
    cx.fillStyle=g; cx.beginPath(); cx.arc(fx,fy,ff.sz*9,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(fx,fy,ff.sz,0,Math.PI*2);
    cx.fillStyle=`hsla(${ff.hue},90%,80%,${blink})`; cx.fill();
  });

  // vignette
  const vig=cx.createRadialGradient(w/2,h/2,h*.05,w/2,h/2,h*.9);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,.75)');
  cx.fillStyle=vig; cx.fillRect(0,0,w,h);

  frame++;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
