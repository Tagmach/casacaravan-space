#words{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,19px);font-weight:300;font-style:italic;color:rgba(194,179,159,0);line-height:2;animation:fw 3s ease forwards 4s;white-space:nowrap;}

<script>
// ── SCENE ────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x010402);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010402, 0.038);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 80);
camera.position.set(0, 1.7, 0);
camera.lookAt(0, 1.7, -10);

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── LIGHTS ────────────────────────────────────────────────────────
// Moonlight — cold blue-white from above
const moon = new THREE.DirectionalLight(0xaad0b8, 1.4);
moon.position.set(3, 8, -5);
scene.add(moon);

// Ambient — very dark green
scene.add(new THREE.AmbientLight(0x0a1e08, 2.2));

// Warm glow deep in forest
const deepGlow = new THREE.PointLight(0x1a3a0a, 2.5, 18);
deepGlow.position.set(0, 2, -22);
scene.add(deepGlow);

// ── GROUND ───────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 80),
  new THREE.MeshStandardMaterial({color:0x030a02, roughness:1})
);
ground.rotation.x = -Math.PI/2;
ground.position.set(0, 0, -20);
scene.add(ground);

// ── FORK PATHS ───────────────────────────────────────────────────

// ── TREE BUILDER ─────────────────────────────────────────────────
function makeTree(x, z, h, r, dark){
  const group = new THREE.Group();

  const tColor = new THREE.MeshStandardMaterial({color: dark ? 0x0a1a06 : 0x0e2a08, roughness:1});
  const cMat   = new THREE.MeshStandardMaterial({color: dark ? 0x061008 : 0x0c1e0a, roughness:1});

  // Trunk — tall, thin, slightly irregular
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.06, r*0.11, h, 5, 1, false),
    tColor
  );
  trunk.position.y = h/2;
  group.add(trunk);

  // Jungle canopy — many small chaotic clusters, no symmetry
  const clusterCount = dark ? 5 : 9;
  for(let i=0; i<clusterCount; i++){
    // Random spread around crown — messy, organic
    const angle  = Math.random()*Math.PI*2;
    const spread = r*(0.2 + Math.random()*0.9);
    const cx2    = Math.cos(angle)*spread;
    const cz2    = Math.sin(angle)*spread;
    const cy2    = h*(0.55 + Math.random()*0.42);

    // Each cluster is a deformed sphere — scale differently on each axis
    const sx = r*(0.4+Math.random()*0.7);
    const sy = r*(0.25+Math.random()*0.45);
    const sz = r*(0.4+Math.random()*0.7);

    const blob = new THREE.Mesh(
      new THREE.SphereGeometry(1, 5+Math.floor(Math.random()*3), 4),
      cMat
    );
    blob.scale.set(sx, sy, sz);
    blob.position.set(cx2, cy2, cz2);
    blob.rotation.set(Math.random(), Math.random(), Math.random());
    group.add(blob);
  }

  // A few larger anchor blobs near top
  for(let i=0; i<(dark?1:2); i++){
    const anchor = new THREE.Mesh(
      new THREE.SphereGeometry(r*(0.6+Math.random()*0.5), 6, 5),
      cMat
    );
    anchor.scale.y = 0.4+Math.random()*0.3;
    anchor.position.set(
      (Math.random()-0.5)*r*0.5,
      h*(0.82+Math.random()*0.15),
      (Math.random()-0.5)*r*0.5
    );
    group.add(anchor);
  }

  // Exposed roots hint at base — thin box splays
  if(!dark){
    for(let b=0; b<3; b++){
      const rootAngle = (b/3)*Math.PI*2 + Math.random()*0.5;
      const root = new THREE.Mesh(
        new THREE.BoxGeometry(r*0.06, r*0.08, r*0.5),
        tColor
      );
      root.position.set(Math.cos(rootAngle)*r*0.3, r*0.04, Math.sin(rootAngle)*r*0.3);
      root.rotation.y = rootAngle;
      root.rotation.z = 0.3;
      group.add(root);
    }
  }

  group.position.set(x, 0, z);
  group.rotation.y = Math.random()*Math.PI*2;
  group.rotation.z = (Math.random()-0.5)*0.05;
  scene.add(group);
  return group;
}

// ── BUSH / UNDERGROWTH ───────────────────────────────────────────
function makeBush(x, z, scale){
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0x071408).lerp(new THREE.Color(0x0c1e08), Math.random()),
    roughness:1
  });
  const clumps = 3 + Math.floor(Math.random()*4);
  for(let i=0; i<clumps; i++){
    const blob = new THREE.Mesh(
      new THREE.SphereGeometry(1, 4, 3),
      mat
    );
    blob.scale.set(
      scale*(0.3+Math.random()*0.5),
      scale*(0.18+Math.random()*0.22),
      scale*(0.3+Math.random()*0.5)
    );
    blob.position.set(
      (Math.random()-0.5)*scale*0.8,
      scale*(0.12+Math.random()*0.18),
      (Math.random()-0.5)*scale*0.8
    );
    group.add(blob);
  }
  group.position.set(x, 0, z);
  group.rotation.y = Math.random()*Math.PI*2;
  scene.add(group);
}

// ── POPULATE FOREST ───────────────────────────────────────────────
const trees = [];

// Far background — small, many (outside fork zones)
for(let i=0; i<22; i++){
  const angle = (i/22)*Math.PI*2;
  const dist  = 18 + Math.random()*12;
  const x     = Math.cos(angle)*dist*(0.8+Math.random()*0.4);
  const z     = -8 + Math.sin(angle)*dist*0.5 - Math.random()*8;
  if(Math.abs(x)<2.5 && z>-10) continue; // center path clear
  if(x<-1 && x>-16 && z<-7 && z>-34) continue; // left fork CLEAR
  if(x>1 && x<16 && z<-7 && z>-34) continue;   // right fork CLEAR
  trees.push(makeTree(x, z, 3+Math.random()*3, 0.7+Math.random()*0.5, true));
}

// Mid distance — only between fork paths (center divider x:-3 to +3, z<-10)
for(let i=0; i<12; i++){
  const x = (Math.random()-0.5)*4;   // x: -2 to +2, center divider
  const z = -(10 + Math.random()*18);
  trees.push(makeTree(x, z, 4+Math.random()*3, 0.8+Math.random()*0.6, false));
}

// Near — large trees flanking center path only (before fork)
const nearLeft  = [-2.8, -3.5, -4.2];
const nearRight = [ 2.8,  3.5,  4.2];
nearLeft.forEach((x,i)=>{
  trees.push(makeTree(x, -(1.5+i*2.5), 7+i*0.8, 1.4+i*0.15, false));
});
nearRight.forEach((x,i)=>{
  trees.push(makeTree(x, -(1.5+i*2.5), 7+i*0.8, 1.4+i*0.15, false));
});

// Dense center divider trees between the two fork arms
for(let i=0; i<10; i++){
  const x = (Math.random()-0.5)*3.5;
  const z = -(9 + i*2.2 + Math.random()*1.5);
  trees.push(makeTree(x, z, 5+Math.random()*4, 1+Math.random()*0.7, false));
}

// ── UNDERGROWTH ──────────────────────────────────────────────────
nearLeft.forEach((x,i)=>{
  for(let b=0;b<3;b++) makeBush(x+(Math.random()-0.5)*1.2, -(0.5+i*2.5+Math.random()*1.5), 0.4+Math.random()*0.5);
});
nearRight.forEach((x,i)=>{
  for(let b=0;b<3;b++) makeBush(x+(Math.random()-0.5)*1.2, -(0.5+i*2.5+Math.random()*1.5), 0.4+Math.random()*0.5);
});
// Center divider bushes
for(let i=0;i<16;i++){
  const bx=(Math.random()-0.5)*3;
  const bz=-(9+Math.random()*20);
  makeBush(bx, bz, 0.3+Math.random()*0.6);
}
// Deep background
for(let i=0;i<14;i++){
  const bx=(Math.random()-0.5)*30;
  const bz=-(20+Math.random()*14);
  // Skip fork paths
  if(bx<-1&&bx>-16&&bz>-34) continue;
  if(bx>1&&bx<16&&bz>-34) continue;
  makeBush(bx, bz, 0.25+Math.random()*0.4);
}

// Path floor — slightly lighter strip
// Path — layered earth tones

// ── S-CURVE FORK PATHS ───────────────────────────────────────────
const dirtMat = new THREE.MeshStandardMaterial({color:0x1a0e06, roughness:0.95, depthWrite:true, side:THREE.DoubleSide});

// Center path — approaches fork
const centerPath = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 12), dirtMat);
centerPath.rotation.x = -Math.PI/2;
centerPath.position.set(0, 0.02, -2);
centerPath.renderOrder = 2;
scene.add(centerPath);

// Helper: build a tube-like flat path from a CatmullRom curve
function makeCurvedPath(points, width, mat){
  const curve = new THREE.CatmullRomCurve3(points.map(p=>new THREE.Vector3(...p)));
  const N = 30;
  const verts = [];
  const idx = [];
  for(let i=0;i<=N;i++){
    const t = i/N;
    const pt = curve.getPoint(t);
    const tang = curve.getTangent(t);
    // Perpendicular in XZ plane
    const perp = new THREE.Vector3(-tang.z, 0, tang.x).normalize();
    const l = pt.clone().addScaledVector(perp,  width/2);
    const r = pt.clone().addScaledVector(perp, -width/2);
    verts.push(l.x, 0.02, l.z, r.x, 0.02, r.z);
    if(i<N){
      const b=i*2;
      idx.push(b,b+2,b+1, b+1,b+2,b+3);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts),3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 2;
  return mesh;
}

// Left fork — S curve: starts center, curves left smoothly
const leftPath = makeCurvedPath([
  [0,    0, -7],   // fork start
  [-1.5, 0, -11],  // begin curving left
  [-4,   0, -16],  // mid curve
  [-7,   0, -21],  // straightening
  [-10,  0, -26],  // end
  [-10,  0, -32],
], 2.6, dirtMat);
scene.add(leftPath);

// Right fork — S curve: starts center, curves right smoothly  
const rightPath = makeCurvedPath([
  [0,   0, -7],    // fork start
  [1.5, 0, -11],   // begin curving right
  [4,   0, -16],   // mid curve
  [7,   0, -21],   // straightening
  [10,  0, -26],   // end
  [10,  0, -32],
], 2.6, dirtMat);
scene.add(rightPath);

// ── TREES ALONG FORK SIDES ────────────────────────────────────────
const leftCurve = new THREE.CatmullRomCurve3([[0,0,-7],[-1.5,0,-11],[-4,0,-16],[-7,0,-21],[-10,0,-26],[-10,0,-32]].map(p=>new THREE.Vector3(...p)));
const rightCurve = new THREE.CatmullRomCurve3([[0,0,-7],[1.5,0,-11],[4,0,-16],[7,0,-21],[10,0,-26],[10,0,-32]].map(p=>new THREE.Vector3(...p)));

for(let i=0;i<9;i++){
  const t=(i+0.5)/9;
  const lp=leftCurve.getPoint(t), lt=leftCurve.getTangent(t);
  const lperp=new THREE.Vector3(-lt.z,0,lt.x).normalize();
  // Outer left — further out
  const loOff=lp.clone().addScaledVector(lperp, 3.0+Math.random()*1.2);
  trees.push(makeTree(loOff.x,loOff.z,5+Math.random()*4,1+Math.random()*0.5,i%2===0));
  // Inner left — further in
  const liOff=lp.clone().addScaledVector(lperp,-3.0-Math.random()*1.2);
  trees.push(makeTree(liOff.x,liOff.z,4+Math.random()*3,0.8+Math.random()*0.4,i%3===0));

  const rp=rightCurve.getPoint(t), rt=rightCurve.getTangent(t);
  const rperp=new THREE.Vector3(-rt.z,0,rt.x).normalize();
  // Outer right
  const roOff=rp.clone().addScaledVector(rperp,-3.0-Math.random()*1.2);
  trees.push(makeTree(roOff.x,roOff.z,5+Math.random()*4,1+Math.random()*0.5,i%2===0));
  // Inner right
  const riOff=rp.clone().addScaledVector(rperp, 3.0+Math.random()*1.2);
  trees.push(makeTree(riOff.x,riOff.z,4+Math.random()*3,0.8+Math.random()*0.4,i%3===0));
}

// Path edges — darker soil
const edgeMat = new THREE.MeshStandardMaterial({color:0x120a04, roughness:1});
[-1.8, 1.8].forEach(ex => {
  const edge = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 60), edgeMat);
  edge.rotation.x = -Math.PI/2;
  edge.position.set(ex, 0.011, -20);
  scene.add(edge);
});

// Scattered leaf/dirt patches on path
const patchMat = new THREE.MeshStandardMaterial({color:0x251208, roughness:1});
for(let i=0; i<18; i++){
  const patch = new THREE.Mesh(
    new THREE.CircleGeometry(0.08+Math.random()*0.18, 5),
    patchMat
  );
  patch.rotation.x = -Math.PI/2;
  patch.position.set(
    (Math.random()-0.5)*2.8,
    0.012,
    -(1+Math.random()*38)
  );
  scene.add(patch);
}

// ── FIREFLIES ─────────────────────────────────────────────────────
const FF_COUNT = 24;
const ffGeo = new THREE.BufferGeometry();
const ffPos = new Float32Array(FF_COUNT*3);
const ffData = [];
for(let i=0; i<FF_COUNT; i++){
  const x = (Math.random()-0.5)*6;
  const y = 0.5 + Math.random()*3;
  const z = -(2+Math.random()*20);
  ffPos[i*3]=x; ffPos[i*3+1]=y; ffPos[i*3+2]=z;
  ffData.push({x,y,z,blink:Math.random()*Math.PI*2,bs:0.4+Math.random()*1.2,vx:(Math.random()-.5)*.005,vy:(Math.random()-.5)*.003,vz:(Math.random()-.5)*.004});
}
ffGeo.setAttribute('position', new THREE.Float32BufferAttribute(ffPos,3));
const ffMat = new THREE.PointsMaterial({
  color:0xc8e040, size:0.18, transparent:true, opacity:0.9,
  sizeAttenuation:true,
  map:(()=>{
    const c=document.createElement('canvas');c.width=32;c.height=32;
    const x=c.getContext('2d');
    const g=x.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0,'rgba(200,224,64,1)');
    g.addColorStop(0.3,'rgba(180,210,40,0.8)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.fillRect(0,0,32,32);
    const t=new THREE.CanvasTexture(c);return t;
  })(),
  depthWrite:false
});
const ffPoints = new THREE.Points(ffGeo, ffMat);
scene.add(ffPoints);

// ── CAMERA SLOW DRIFT ─────────────────────────────────────────────
let camT = 0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  camT += dt;

  // Walk forward
  const targetZ = currentPath === 'center' ? Math.min(camT * 0.6, 5) : 
                  currentPath === 'phone' ? Math.min(5 + (camT - pathStartT) * 1.0, 20) :
                  Math.min(5 + (camT - pathStartT) * 1.2, 21); // z=-21, ağacın önünde dur
  camera.position.z = -targetZ;

  if(currentPath === 'center'){
    camera.position.x = Math.sin(camT*0.18)*0.06;
    camera.position.y = 1.7 + Math.sin(camT*0.12)*0.02;
    camera.lookAt(0, 1.6, -12);
  } else if(currentPath === 'red'){
    // Kırmızı ağaç x:-10, z:-24 — direkt bak, X'e de doğru ilerle
    camera.position.x += (camTargetX - camera.position.x)*0.02;
    camera.position.y = 1.7 + Math.sin(camT*0.08)*0.01;
    camera.lookAt(-10, 2.5, -24); // ağacın gövdesine bak
  } else {
    // Phone path — sağa git
    camera.position.x += (camTargetX - camera.position.x)*0.025;
    camera.position.y = 1.7 + Math.sin(camT*0.12)*0.015;
    camera.lookAt(camera.position.x + 2, 1.6, camera.position.z - 8);
  }

  // Firefly movement
  const pos = ffGeo.attributes.position.array;
  ffData.forEach((ff,i)=>{
    ff.x+=ff.vx; ff.y+=ff.vy; ff.z+=ff.vz;
    ff.vx+=(Math.random()-.5)*.001; ff.vy+=(Math.random()-.5)*.0008;
    ff.vx*=.97; ff.vy*=.97;
    if(Math.abs(ff.x)>5) ff.vx*=-1;
    if(ff.y<0.3||ff.y>4) ff.vy*=-1;
    if(ff.z>-1||ff.z<-24) ff.vz*=-1;
    pos[i*3]=ff.x; pos[i*3+1]=ff.y; pos[i*3+2]=ff.z;
  });
  ffGeo.attributes.position.needsUpdate=true;

  // Firefly blink
  ffMat.opacity = 0.3 + Math.abs(Math.sin(camT*1.8))*0.65;

  // Deep glow pulse
  deepGlow.intensity = 1.8 + Math.sin(camT*0.4)*0.7;
  // Red tree glow pulse
  if(redPathActive) redGlow.intensity = 1.5 + Math.sin(camT*0.6)*0.8;
  // Old camera path targeting removed — handled above

  renderer.render(scene, camera);
}

// ── PATH SYSTEM ───────────────────────────────────────────────────
let currentPath = 'center';
let camTargetX = 0;
let phoneLightOn = false;
let redPathActive = false;
let pathStartT = 0;

function choosePath(path){
  currentPath = path;
  pathStartT = camT;
  if(path === 'phone'){
    phoneLightOn = true;
    document.getElementById('phone-light').classList.add('on');
    document.getElementById('path-choice').style.opacity='0';
    document.getElementById('path-choice').style.pointerEvents='none';
    camTargetX = 7;  // phone = sağ
  } else if(path === 'red'){
    redPathActive = true;
    document.getElementById('path-choice').style.opacity='0';
    document.getElementById('path-choice').style.pointerEvents='none';
    document.getElementById('red-path-hint').style.opacity='1';
    camTargetX = -9;  // red tree = sol x:-10
    setTimeout(checkKey6, 3000);
  }
}

function checkKey6(){
  if(typeof CC_KEYS==='undefined'||!CC_KEYS.isPlaying()) return;
  if(CC_KEYS.hasKey(6)) return;
  if(CC_KEYS.keyCount()>=5){
    document.getElementById('key6-ff').style.display='block';
  }
}

function takeKey6(){
  CC_KEYS.award(6);
  document.getElementById('key6-ff').style.display='none';
}

}
