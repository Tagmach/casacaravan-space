<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Forest — Casa Caravan Space</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#010402;font-family:'Jost',sans-serif;}
#c{position:fixed;inset:0;z-index:0;}
#hdr{position:fixed;top:0;left:0;right:0;z-index:20;padding:16px 28px;display:flex;align-items:center;background:linear-gradient(to bottom,rgba(1,4,2,0.85),transparent);}
#hdr-brand{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;color:rgba(212,194,175,0.55);text-transform:uppercase;}
#hdr-back{margin-left:auto;font-size:9px;letter-spacing:2px;color:rgba(120,110,100,0.5);text-transform:uppercase;border:1px solid rgba(46,42,38,0.4);padding:6px 16px;border-radius:100px;background:none;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.3s;}
#hdr-back:hover{border-color:rgba(160,128,96,0.5);color:rgba(160,128,96,0.7);}
#words{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,19px);font-weight:300;font-style:italic;color:rgba(194,179,159,0);line-height:2;animation:fw 3s ease forwards 4s;white-space:nowrap;}
@keyframes fw{to{color:rgba(194,179,159,0.55);}}
#btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;padding:10px 28px;background:none;border:1px solid rgba(74,122,26,0);color:rgba(74,122,26,0);border-radius:100px;cursor:pointer;transition:all 0.4s;animation:fb 1.5s ease forwards 7s;}
@keyframes fb{to{color:rgba(116,176,40,0.5);border-color:rgba(74,122,26,0.35);}}
#btn:hover{border-color:rgba(122,176,60,0.7)!important;color:rgba(160,220,80,0.85)!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hdr">
  <div id="hdr-brand">Casa Caravan Space</div>
  <button id="hdr-back" onclick="history.back()">← Garden</button>
</div>
<div id="words">Turn off the light.<br>Wait.<br>Your sight will return.</div>
<button id="btn" onclick="history.back()">Not yet. Back to the garden.</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENE ────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x010402);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010402, 0.038);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 80);
camera.position.set(0, 1.7, 0);
camera.lookAt(0, 1.7, -10);

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── LIGHTS ────────────────────────────────────────────────────────
// Moonlight — cold blue-white from above
const moon = new THREE.DirectionalLight(0x8ab8d0, 0.4);
moon.position.set(3, 8, -5);
scene.add(moon);

// Ambient — very dark green
scene.add(new THREE.AmbientLight(0x030a02, 0.8));

// Warm glow deep in forest
const deepGlow = new THREE.PointLight(0x1a3a0a, 2.5, 18);
deepGlow.position.set(0, 2, -22);
scene.add(deepGlow);

// ── GROUND ───────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 80),
  new THREE.MeshStandardMaterial({color:0x030a02, roughness:1})
);
ground.rotation.x = -Math.PI/2;
ground.position.set(0, 0, -20);
scene.add(ground);

// ── TREE BUILDER ─────────────────────────────────────────────────
function makeTree(x, z, h, r, dark){
  const group = new THREE.Group();

  const tColor = new THREE.Color(dark ? 0x020602 : 0x040c02);
  const cColor = new THREE.Color(dark ? 0x010401 : 0x030802);

  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.08, r*0.14, h, 6),
    new THREE.MeshStandardMaterial({color:tColor, roughness:1})
  );
  trunk.position.y = h/2;
  group.add(trunk);

  // Crown layers — stacked cones for depth
  const layers = dark ? 3 : 4;
  for(let i=0; i<layers; i++){
    const p = i/layers;
    const coneH = h*(0.45-p*0.08);
    const coneR = r*(0.9-p*0.25);
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(coneR, coneH, 7),
      new THREE.MeshStandardMaterial({color:cColor, roughness:1})
    );
    cone.position.y = h*(0.55 + p*0.38);
    group.add(cone);
  }

  group.position.set(x, 0, z);
  // Slight random lean
  group.rotation.z = (Math.random()-0.5)*0.04;
  group.rotation.x = (Math.random()-0.5)*0.02;
  scene.add(group);
  return group;
}

// ── POPULATE FOREST ───────────────────────────────────────────────
const trees = [];

// Far background — small, many
for(let i=0; i<22; i++){
  const angle = (i/22)*Math.PI*2;
  const dist  = 18 + Math.random()*12;
  const x     = Math.cos(angle)*dist*(0.8+Math.random()*0.4);
  const z     = -8 + Math.sin(angle)*dist*0.5 - Math.random()*8;
  if(Math.abs(x)<2.5 && z>-14) continue; // keep path clear
  trees.push(makeTree(x, z, 3+Math.random()*3, 0.7+Math.random()*0.5, true));
}

// Mid distance
for(let i=0; i<16; i++){
  const side  = i<8 ? -1 : 1;
  const x     = side*(2.2+Math.random()*4);
  const z     = -(4 + i%8 * 2.2 + Math.random()*1.5);
  trees.push(makeTree(x, z, 5+Math.random()*4, 1+Math.random()*0.8, false));
}

// Near — large trees flanking path
const nearLeft  = [-2.8, -3.5, -4.2, -3.0, -4.8];
const nearRight = [ 2.8,  3.5,  4.2,  3.0,  4.8];
nearLeft.forEach((x,i)=>{
  trees.push(makeTree(x, -(1.5+i*3.2), 7+i*0.8, 1.4+i*0.15, false));
});
nearRight.forEach((x,i)=>{
  trees.push(makeTree(x, -(1.5+i*3.2), 7+i*0.8, 1.4+i*0.15, false));
});

// Path floor — slightly lighter strip
const pathMat = new THREE.MeshStandardMaterial({color:0x040d03, roughness:1});
const path = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 60), pathMat);
path.rotation.x = -Math.PI/2;
path.position.set(0, 0.01, -20);
scene.add(path);

// ── FIREFLIES ─────────────────────────────────────────────────────
const FF_COUNT = 24;
const ffGeo = new THREE.BufferGeometry();
const ffPos = new Float32Array(FF_COUNT*3);
const ffData = [];
for(let i=0; i<FF_COUNT; i++){
  const x = (Math.random()-0.5)*6;
  const y = 0.5 + Math.random()*3;
  const z = -(2+Math.random()*20);
  ffPos[i*3]=x; ffPos[i*3+1]=y; ffPos[i*3+2]=z;
  ffData.push({x,y,z,blink:Math.random()*Math.PI*2,bs:0.4+Math.random()*1.2,vx:(Math.random()-.5)*.005,vy:(Math.random()-.5)*.003,vz:(Math.random()-.5)*.004});
}
ffGeo.setAttribute('position', new THREE.Float32BufferAttribute(ffPos,3));
const ffMat = new THREE.PointsMaterial({color:0xc8e040, size:0.12, transparent:true, opacity:0.9});
const ffPoints = new THREE.Points(ffGeo, ffMat);
scene.add(ffPoints);

// ── CAMERA SLOW DRIFT ─────────────────────────────────────────────
let camT = 0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  camT += dt;

  // Very slow forward drift — 1 unit per ~20s, then pause
  const drift = Math.min(camT * 0.04, 0.8);
  camera.position.z = -drift;
  // Subtle sway
  camera.position.x = Math.sin(camT*0.18)*0.04;
  camera.position.y = 1.7 + Math.sin(camT*0.12)*0.015;
  camera.lookAt(Math.sin(camT*0.08)*0.08, 1.6, -12);

  // Firefly movement
  const pos = ffGeo.attributes.position.array;
  ffData.forEach((ff,i)=>{
    ff.x+=ff.vx; ff.y+=ff.vy; ff.z+=ff.vz;
    ff.vx+=(Math.random()-.5)*.001; ff.vy+=(Math.random()-.5)*.0008;
    ff.vx*=.97; ff.vy*=.97;
    if(Math.abs(ff.x)>5) ff.vx*=-1;
    if(ff.y<0.3||ff.y>4) ff.vy*=-1;
    if(ff.z>-1||ff.z<-24) ff.vz*=-1;
    pos[i*3]=ff.x; pos[i*3+1]=ff.y; pos[i*3+2]=ff.z;
  });
  ffGeo.attributes.position.needsUpdate=true;

  // Firefly blink
  ffMat.opacity = 0.3 + Math.abs(Math.sin(camT*1.8))*0.65;

  // Deep glow pulse
  deepGlow.intensity = 1.8 + Math.sin(camT*0.4)*0.7;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
