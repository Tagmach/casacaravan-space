<style>
:root {
  --bg:    #0a0908;
  --bg2:   #131110;
  --bg3:   #1e1b18;
  --gold:  #A08060;
  --cream: #D2C3AF;
  --text:  #C8C2B8;
  --muted: #7A7068;
  --dim:   #6B5F52;
  --border:#2E2A26;
  --green: #1D9E75;
  --red:   #8B3A3A;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--text); font-family:'Jost',sans-serif; overflow:hidden; }

/* -- SHARED TRANSITIONS -- */

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* --------------------------------------------
   ENTRANCE
-------------------------------------------- */
#entrance {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.entrance-lines span {
  position: absolute;
  display: block;
  height: 1px;
  width: 100%;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  opacity: 0.4;
}
.entrance-lines span:nth-child(1) { top: 25%; }
.entrance-lines span:nth-child(2) { top: 50%; }
.entrance-lines span:nth-child(3) { top: 75%; }

.gong-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  cursor: pointer;
  position: relative;
}

.gong-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 0.15s ease;
  box-shadow: 0 0 0 6px #1a1208, 0 0 0 8px #3a2810;
}

.gong-circle:hover { transform: scale(1.03); }
.gong-circle:active { transform: scale(0.96); }

.gong-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--gold);
  opacity: 0;
  pointer-events: none;
}

.gong-ring.pulse { animation: ripple 2s ease-out forwards; }

@keyframes ripple {
  0%   { width:140px; height:140px; opacity:0.6; top:0; left:0; }
  100% { width:340px; height:340px; opacity:0; top:-100px; left:-100px; }
}

.gong-inner {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  border: 1px solid #5a3e1e;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.gong-mid {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 0.5px solid #3a2810;
}

.gong-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px #c8a050;
}

.entrance-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--cream);
  letter-spacing: 0.06em;
  text-align: center;
}

.entrance-sub {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: -16px;
  text-align: center;
}

.entrance-hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 5px;
  text-transform: uppercase;
}

.entrance-credit {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  white-space: nowrap;
}

</style>
</head>

<div id="entrance">

    <div class="gong-circle">
      <div class="gong-ring" id="ring1"></div>
      <div class="gong-ring" id="ring2"></div>
      <div class="gong-ring" id="ring3"></div>
      <div class="gong-inner">
        <div class="gong-mid"></div>
        <div class="gong-dot"></div>
      </div>
    </div>

<!-- --------------------------------------------
     CORRIDOR
-------------------------------------------- -->
<script src="tracking.js"></script>
<script>
const gongBtn = document.getElementById('gongBtn');
const rings = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

gongBtn.addEventListener('click', function() {
  // Ripple animation
  rings.forEach((r, i) => {
    setTimeout(() => {
      r.classList.remove('pulse');
      void r.offsetWidth;
      r.classList.add('pulse');
    }, i * 180);
  });

  // Play gong entrance sound
  const snd = new Audio('gong_entrance.mp3');
  snd.volume = 0.85;
  snd.play().catch(() => {});

  // Navigate after 2.5 seconds
  setTimeout(() => { window.location.href = 'corridor-3d.html'; }, 2500);
});
</script>
