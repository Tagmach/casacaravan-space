name: Khashif Wake (manual backup)

# Backup trigger only — cron-job.org is the primary hourly trigger.
# Manual (workflow_dispatch) so this does NOT double-fire alongside it,
# which used to cause duplicate journeys and duplicate operator emails.
on:
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Uyandır
        run: curl https://khashif.onrender.com/status
      - name: Bekle
        run: sleep 30
      - name: Göreve gönder
        run: |
          curl -X POST \
            -H "X-Khashif-Key: khashif2026" \
            https://khashif.onrender.com/task
